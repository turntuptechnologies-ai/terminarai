<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP (defense in depth) — index.html と揃える -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>terminarai — リダイレクト中</title>
    <!--
      GitHub Pages SPA fallback のリダイレクト処理。
      CSP の script-src 'self' を満たすため外部ファイル化している。

      重要: GitHub Pages はあらゆる存在しないパス (例 /terminarai/chapter/1/lesson/1-1)
      に対してこの 404.html を「リクエストされたパスのまま」返す。そのため `./`
      相対パスは存在しないパスを基点に解決されてしまい、redirect スクリプトが
      404 になる (= SPA fallback 全壊)。base path を明示した絶対パスで参照する。
    -->
    <script src="/terminarai/404-redirect.js"></script>
  </head>
  <body></body>
</html>
