<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!--
      terminarai OGP 画像 生成用 HTML (1200×630)
      headless Chrome で PNG 化する: scripts/og/README.md 参照
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+JP:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 78% 18%, rgba(16, 185, 129, 0.16), transparent 45%),
          radial-gradient(circle at 12% 88%, rgba(16, 185, 129, 0.08), transparent 40%), #09090b;
        font-family: "Noto Sans JP", sans-serif;
      }

      /* ターミナルウィンドウ */
      .window {
        width: 1080px;
        height: 510px;
        background: #0c0c0f;
        border: 1px solid #27272a;
        border-radius: 18px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .titlebar {
        height: 52px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 22px;
        border-bottom: 1px solid #27272a;
        background: #18181b;
      }
      .dot {
        width: 15px;
        height: 15px;
        border-radius: 50%;
      }
      .dot.r {
        background: #ff5f56;
      }
      .dot.y {
        background: #ffbd2e;
      }
      .dot.g {
        background: #27c93f;
      }
      .tab {
        margin-left: 16px;
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        color: #71717a;
      }

      .body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 64px;
        text-align: center;
      }
      .logo {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 132px;
        letter-spacing: -2px;
        color: #f4f4f5;
        line-height: 1;
        text-shadow: 0 0 40px rgba(52, 211, 153, 0.25);
      }
      .logo .cursor {
        color: #34d399;
      }
      .subtitle {
        margin-top: 30px;
        font-weight: 700;
        font-size: 46px;
        color: #d4d4d8;
        letter-spacing: 2px;
      }
      .prompt {
        margin-top: 36px;
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        color: #71717a;
      }
      .prompt .sym {
        color: #34d399;
        font-weight: 700;
      }
      .prompt .typed {
        color: #d4d4d8;
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
        <span class="tab">terminarai — bash</span>
      </div>
      <div class="body">
        <div class="logo">terminarai<span class="cursor">_</span></div>
        <div class="subtitle">Linux CLI 見習い道場</div>
        <div class="prompt">
          <span class="sym">visitor@terminarai:~$</span> <span class="typed">ls</span>
        </div>
      </div>
    </div>
  </body>
</html>
