<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP (defense in depth)
      - script-src 'self' のみ (no unsafe-inline) — インライン script は外部化済み
      - style-src は 'unsafe-inline' を許容 (React の style props のため、回避困難)
      - frame-ancestors は meta タグでは無視されるため未指定 (HTTP ヘッダ専用)
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- ICO はレガシーブラウザ用フォールバック (modern は SVG 優先) -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="terminarai — Linux CLI 見習い道場。仮想シェルでコマンドを練習する学習サイト。" />
    <title>terminarai — Linux CLI 見習い道場</title>

    <!--
      OGP / Twitter Card (SNS シェア用)
      クローラはビルド後の絶対 URL を解決する必要があるため、画像・URL は
      GitHub Pages の完全な URL を直書きする (Vite の base 変換に依存しない)。
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="terminarai" />
    <meta property="og:title" content="terminarai — Linux CLI 見習い道場" />
    <meta property="og:description" content="ブラウザの仮想シェルで Linux の基本コマンドを練習できる学習サイト。" />
    <meta property="og:url" content="https://turntuptechnologies-ai.github.io/terminarai/" />
    <meta property="og:image" content="https://turntuptechnologies-ai.github.io/terminarai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="terminarai — Linux CLI 見習い道場" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="terminarai — Linux CLI 見習い道場" />
    <meta name="twitter:description" content="ブラウザの仮想シェルで Linux の基本コマンドを練習できる学習サイト。" />
    <meta name="twitter:image" content="https://turntuptechnologies-ai.github.io/terminarai/og-image.png" />

    <!--
      フォント (Google Fonts CDN 経由、無料・OFL)
      - UI: Inter (英数) + Noto Sans JP (日本語)
      - Terminal: Cascadia Code
      Noto Sans JP は unicode-range で実使用文字のみ自動ロードされる。
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;500&family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap"
    />
    <!--
      SPA fallback の復元 (404.html → /?/<path> → 元の URL に戻す)
      React Router 初期化前に同期的に走らせる必要があるため、defer/module でなく通常 script。
      CSP の script-src 'self' を満たすため外部ファイル化している。
    -->
    <script src="/spa-restore.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
