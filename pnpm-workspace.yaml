# pnpm 設定 (サプライチェーン対策)
# 単一パッケージだが、pnpm 10/11 では pnpm 固有設定の置き場が
# pnpm-workspace.yaml に集約されるため、ここに記載する。

# cooldown: 公開からこの分数が経過していないバージョンはインストールしない。
# npm の悪意あるバージョンは公開後 数時間〜半日 で削除される事例が大半のため、
# 3 日 (4320 分) のクールダウンで「踏む」リスクを大幅に下げる。
# (pnpm 10.16+ で利用可能。設定すると strict モードが既定で有効)
minimumReleaseAge: 4320

# 型定義パッケージは実行コードを含まないため cooldown から除外する。
minimumReleaseAgeExclude:
  - "@types/*"

# インストール時のライフサイクルスクリプト (postinstall 等) を実行する依存の
# allowlist。本リポジトリはビルドスクリプトを要求する依存がゼロのため、
# 空にして「一切実行しない」を明示・固定する。
# 将来ビルドが必要な依存を入れた場合は `pnpm approve-builds` で精査の上ここに追記する。
onlyBuiltDependencies: []
